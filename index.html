<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="img.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" type="text/css" href="app.css">
    <script src="app.js" defer></script>

    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="vendor/driver_js/driver.js"></script>
    <link rel="stylesheet" href="vendor/driver_js/driver.css"/>

    <title>Bar App</title>
</head>
<body>

    <div class="header-wrapper">
        <div class="header">
            <div class="header-first-line">
                <div id="total">Gesamt: 0.00 €</div>
                <button class="button-site-change" style="background-color: #555555;" onclick="location.href='essen.html'">zum Essen</button>
            </div>

            <div id="items"></div>
        </div>
    </div>

    <div class="button-wrapper-wrapper">

        <div class="buttons-wrapper">
            <button class="button utility-button" onclick="resetAll()">Zurücksetzen</button>
            <button class="button utility-button" style="visibility: hidden"></button>
            <button class="button utility-button" onclick="addItem('Pfand', 3.00, '#555')">Pfand</button>
            <button class="button utility-button" onclick="addItem('Pfand zurück', -3.00, '#555')">Pfand zurück</button>
        </div>

        <div class="buttons-wrapper">
            <button class="button" style="background-color: #F5C542;" onclick="addItem('Bier / Radler', 4.00, '#F5C542', true)">Bier / Radler</button>
            <button class="button" style="background-color: #D4A017;" onclick="addItem('Weizenbier / Weizenradler', 5.00, '#D4A017', true)">Weizenbier / Weizenradler</button>
            <button class="button" style="background-color: #efaea2;" onclick="addItem('Weinschorle (Weißherbst / Riesling)', 4.50, '#EFA6A2', true)">Weinschorle 0,5l</button>
            <button class="button utility-button" style="visibility: hidden"></button>
        </div>

        <div class="buttons-wrapper">
            <button class="button" style="background-color: #5c3e30;" onclick="addItem('Cola / Fanta / Mezzo / Lift / FuzeTea', 3.00, '#5C4033', true)">Cola / Fanta / Mezzo / Lift / FuzeTea</button>
            <button class="button utility-button" style="visibility: hidden"></button>
            <button class="button" style="background-color: #050761;" onclick="addItem('Wasser (0,4l)', 2.50, '#050761', true)">Wasser (0,4l)</button>
            <button class="button" style="background-color: #050761;" onclick="addItem('Wasser (0,3l)', 2.00, '#050761', true)">Wasser (0,3l)</button>
            <button class="button" style="background-color: #27ae60;" onclick="addItem('Saft-Schorle (0,4l)', 3.00, '#27ae60', true)">Saft-Schorle (0,4l)</button>
            <button class="button" style="background-color: #27ae60;" onclick="addItem('Saft-Schorle (0,3l)', 2.50, '#27ae60', true)">Saft-Schorle (0,3l)</button>
            <button class="button" style="background-color: #8e44ad;" onclick="addItem('Red Bull', 3.00, '#8e44ad', true)">Red Bull</button>
            <button class="button utility-button" style="visibility: hidden"></button>
        </div>

        <div class="buttons-wrapper">
            <button class="button" style="background-color: #e91e8c;" onclick="addItem('Lillet Berry', 5.50, '#e91e8c', true)">Lillet Berry</button>
            <button class="button" style="background-color: #f4d03f;" onclick="addItem('Limoncello Spritz', 5.50, '#f4d03f', true)">Limoncello Spritz</button>
            <button class="button" style="background-color: #6e2f0f;" onclick="addItem('Asbach-Cola', 3.50, '#6e2f0f', true)">Asbach-Cola</button>
            <button class="button" style="background-color: #2c3e50;" onclick="addItem('Fliegender Hirsch', 4.00, '#2c3e50', true)">Fliegender Hirsch</button>
            <button class="button" style="background-color: #7d3c98;" onclick="addItem('Wodka-Red Bull', 4.00, '#7d3c98', true)">Wodka-Red Bull</button>
            <button class="button" style="background-color: #1a5e20;" onclick="addItem('Jägermeister / Pflümli', 2.00, '#1a5e20', false)">Jägermeister / Pflümli</button>
            <button class="button" style="background-color: #6c3483;" onclick="addItem('Josta-Likör / Wodka-Feige', 2.50, '#6c3483', false)">Josta-Likör / Wodka-Feige</button>
            <button class="button utility-button" style="visibility: hidden"></button>
        </div>
        <div id="receipt" style="padding: 16px; border-top: 1px solid #ccc;">
            <h3>🧾 Quittung</h3>
            <div id="receipt-content"></div>
        </div>
    </div>

</body>
</html>
